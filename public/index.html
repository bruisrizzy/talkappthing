<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <style>
        /* Base Setup */
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; height: 100vh; 
            transition: background 0.3s, color 0.3s;
        }
        #header-container {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
        }
        #theme-selector-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #theme-select {
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            outline: none;
        }
        #room-display {
            font-weight: bold;
        }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px; border-radius: 6px; max-width: 75%; word-break: break-word; transition: background 0.3s; }
        .username { font-weight: bold; margin-bottom: 5px; }
        #form { display: flex; padding: 20px; gap: 10px; }
        #input { flex: 1; padding: 15px; border-radius: 6px; font-size: 1em; outline: none; transition: background 0.3s, border 0.3s; }
        #send-btn { border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.3s; }

        /* THEME 1: CYBERPUNK */
        body.theme-cyberpunk { font-family: 'Courier New', monospace; background: #0d0e15; color: #00ffcc; }
        .theme-cyberpunk #header-container { background: #161925; border-bottom: 1px solid #ff0055; }
        .theme-cyberpunk #theme-select { background: #161925; color: #00ffcc; border: 1px solid #00ffcc; }
        .theme-cyberpunk .message { background: #161925; border-left: 3px solid #ff0055; border-radius: 4px; }
        .theme-cyberpunk .username { color: #ff0055; text-transform: uppercase; }
        .theme-cyberpunk #form { background: #0d0e15; }
        .theme-cyberpunk #input { background: #161925; border: 1px solid #00ffcc; color: #00ffcc; }
        .theme-cyberpunk #send-btn { background: #ff0055; color: white; }
        .theme-cyberpunk #send-btn:hover { background: #cc0044; }

        /* THEME 2: FOREST */
        body.theme-forest { font-family: sans-serif; background: #1f2321; color: #e1e7e4; }
        body.theme-forest #header-container { background: #2a302c; }
        body.theme-forest #theme-select { background: #1f2321; color: #e1e7e4; border: 1px solid #4e6557; }
        body.theme-forest .message { background: #2a302c; border-radius: 8px; }
        body.theme-forest .username { color: #8fa89b; }
        body.theme-forest #form { background: #1f2321; }
        body.theme-forest #input { background: #2a302c; border: none; color: #e1e7e4; }
        body.theme-forest #send-btn { background: #4e6557; color: #e1e7e4; }
        body.theme-forest #send-btn:hover { background: #3d5045; }

        /* THEME 3: MIDNIGHT */
        body.theme-midnight { font-family: sans-serif; background: #000000; color: #ffffff; }
        body.theme-midnight #header-container { background: #0a0a0a; border-bottom: 1px solid #222; }
        body.theme-midnight #theme-select { background: #0a0a0a; color: white; border: 1px solid #333; }
        body.theme-midnight .message { background: #0a0a0a; border: 1px solid #222; }
        body.theme-midnight .username { color: #9d4edd; }
        body.theme-midnight #form { background: #000000; }
        body.theme-midnight #input { background: #0a0a0a; border: 1px solid #333; color: white; }
        body.theme-midnight #input:focus { border-color: #9d4edd; }
        body.theme-midnight #send-btn { background: #7b2cbf; color: white; }
        body.theme-midnight #send-btn:hover { background: #5a189a; }

        /* THEME 4: SUNSET WARMTH */
        body.theme-warm { font-family: sans-serif; background: #2b1a1a; color: #fceade; }
        body.theme-warm #header-container { background: #3d2525; border-bottom: 1px solid #e76f51; }
        body.theme-warm #theme-select { background: #2b1a1a; color: #fceade; border: 1px solid #e76f51; }
        body.theme-warm .message { background: #3d2525; border-radius: 8px; border-right: 3px solid #f4a261; }
        body.theme-warm .username { color: #e76f51; }
        body.theme-warm #form { background: #2b1a1a; }
        body.theme-warm #input { background: #3d2525; border: 1px solid #543434; color: #fceade; }
        body.theme-warm #input:focus { border-color: #e76f51; }
        body.theme-warm #send-btn { background: #e76f51; color: white; }
        body.theme-warm #send-btn:hover { background: #d65d40; }

        /* THEME 5: GLACIER COOL */
        body.theme-cool { font-family: sans-serif; background: #131b23; color: #e0f2f1; }
        body.theme-cool #header-container { background: #1d2a36; border-bottom: 1px solid #4ea8de; }
        body.theme-cool #theme-select { background: #131b23; color: #e0f2f1; border: 1px solid #4ea8de; }
        body.theme-cool .message { background: #1d2a36; border-radius: 8px; border-left: 3px solid #4ea8de; }
        body.theme-cool .username { color: #72efdd; }
        body.theme-cool #form { background: #131b23; }
        body.theme-cool #input { background: #1d2a36; border: 1px solid #2c3e50; color: #e0f2f1; }
        body.theme-cool #input:focus { border-color: #4ea8de; }
        body.theme-cool #send-btn { background: #4ea8de; color: #131b23; }
        body.theme-cool #send-btn:hover { background: #56cfe1; }
    </style>
</head>
<body class="theme-cyberpunk">

    <div id="header-container">
        <div id="room-display">Room: Connecting...</div>
        <div id="theme-selector-container">
            <label for="theme-select">Theme:</label>
            <select id="theme-select">
                <option value="theme-cyberpunk">Cyberpunk Neon</option>
                <option value="theme-forest">Minimalist Forest</option>
                <option value="theme-midnight">Midnight AMOLED</option>
                <option value="theme-warm">Sunset Warmth</option>
                <option value="theme-cool">Glacier Cool</option>
            </select>
        </div>
    </div>

    <div id="chat-box"></div>

    <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button id="send-btn">Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const chatBox = document.getElementById('chat-box');
        const themeSelect = document.getElementById('theme-select');
        const roomDisplay = document.getElementById('room-display');

        const username = prompt("Enter a username:") || "Anonymous";
        const roomCode = prompt("Enter a Room Code or Name:") || "General";

        // Tell the server we want to join this specific room code
        socket.emit('join room', roomCode);
        roomDisplay.textContent = `Room: ${roomCode}`;

        themeSelect.addEventListener('change', (e) => {
            document.body.className = e.target.value;
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                // Send the message along with the target room code
                socket.emit('chat message', { room: roomCode, user: username, text: input.value });
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const item = document.createElement('div');
            item.classList.add('message');
            item.innerHTML = `<div class="username">${data.user}</div><div>${data.text}</div>`;
            chatBox.appendChild(item);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
