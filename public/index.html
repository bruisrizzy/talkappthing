<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Courier New', monospace; 
            background: #0d0e15; color: #00ffcc; 
            display: flex; flex-direction: column; height: 100vh; 
        }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { 
            background: #161925; padding: 12px; border-radius: 4px; 
            border-left: 3px solid #ff0055; max-width: 75%; word-break: break-word; 
        }
        .username { font-weight: bold; color: #ff0055; margin-bottom: 5px; text-transform: uppercase; }
        #form { display: flex; padding: 20px; background: #0d0e15; gap: 10px; }
        #input { 
            flex: 1; background: #161925; border: 1px solid #00ffcc; 
            padding: 15px; border-radius: 4px; color: #00ffcc; font-size: 1em; outline: none; 
        }
        #input::placeholder { color: #00ffcc; opacity: 0.5; }
        #send-btn { 
            background: #ff0055; color: white; border: none; 
            padding: 0 20px; border-radius: 4px; font-weight: bold; cursor: pointer; 
        }
        #send-btn:hover { background: #cc0044; }
    </style>
</head>
<body>

    <div id="chat-box"></div>

    <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button id="send-btn">Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const chatBox = document.getElementById('chat-box');

        const username = prompt("Enter a username:") || "Anonymous";

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                socket.emit('chat message', { user: username, text: input.value });
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const item = document.createElement('div');
            item.classList.add('message');
            item.innerHTML = `<div class="username">${data.user}</div><div>${data.text}</div>`;
            chatBox.appendChild(item);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
